name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      # knip imports drizzle.config.ts to discover the schema as an entry point;
      # that config throws when DATABASE_URL is unset, which makes knip miss the
      # entry and spuriously report schema exports as unused. knip never connects
      # to a database — this placeholder just lets the config module load (the
      # test job has no DB).
      - run: pnpm knip
        env:
          DATABASE_URL: postgres://user:pass@localhost:5432/placeholder
