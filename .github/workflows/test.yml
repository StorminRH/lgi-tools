name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # fallow audit derives its base from git history (merge-base against
          # the PR base / origin default), so it needs full history, not a
          # shallow clone.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      # fallow audit is the static gate of record (dead code, duplication,
      # complexity, architecture boundaries), scoped to the PR diff with
      # new-only attribution. FALLOW_AUDIT_BASE pins the base so detection is
      # robust on the merge-commit checkout; a main push falls back to the
      # commit before the push. fallow is a static analyzer — no DB needed.
      - run: pnpm fallow
        env:
          FALLOW_AUDIT_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
