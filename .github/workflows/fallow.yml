name: fallow (eval)

# NON-BLOCKING evaluation of fallow (a deterministic codebase-intelligence CLI:
# dead code, duplication, complexity, circular deps, architecture boundaries).
# It runs in parallel with the authoritative gate in test.yml and is ADVISORY
# for the entire trial — it never fails CI (fail-on-issues:false + the
# continue-on-error guard below). ESLint + knip in test.yml stay the gate of
# record. Delete this file to end the trial; test.yml is never touched by it.

on:
  pull_request:
  push:
    branches: [main]

# Least privilege. security-events:write uploads SARIF to Code Scanning (free on
# public repos). pull-requests is intentionally omitted — findings surface via
# SARIF + inline annotations, not PR comments, to keep the trial quiet.
permissions:
  contents: read
  security-events: write

concurrency:
  group: fallow-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: fallow audit (PR diff, non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 15   # bound the job; the capture script also caps each tool
    steps:
      - uses: actions/checkout@v4
        with:
          # REQUIRED: default fetch-depth:1 breaks auto-changed-since and any
          # git-history baseline lookup (documented fallow foot-gun).
          fetch-depth: 0

      - name: fallow audit
        # Belt-and-suspenders non-blocking guarantee: fail-on-issues:false stops
        # a `fail` verdict from exiting non-zero, and continue-on-error stops even
        # a fallow crash / binary-verification failure from failing the job during
        # the trial. (Remove both to promote fallow to a gate after the scorecard.)
        continue-on-error: true
        # Pinned to a full commit SHA (== tag v2.96.0), not the mutable @v2 tag:
        # this third-party action runs with security-events:write + pnpm install,
        # so a repointed tag could exfiltrate job secrets. Bump deliberately.
        uses: fallow-rs/fallow@24a30b1d266f477c30f6878fc9e4c34c00d04d75 # v2.96.0
        with:
          command: audit
          fail-on-issues: false
          format: sarif
          sarif: true
          version: ""          # resolve the CLI version from the package.json fallow pin
          artifacts-dir: fallow-out

      # --- same-diff metrics capture (M1–M7), kept OUT of the authoritative
      # test.yml steps. Runs fallow + knip + eslint on the identical diff and
      # uploads one JSON bundle so the trial scorecard is derivable later. ---
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Capture parallel metrics (fallow + knip + eslint, same diff)
        if: always()
        env:
          FALLOW_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          # Mirror the knip npm script: drizzle.config.ts throws without a URL.
          DATABASE_URL: postgres://placeholder@localhost:5432/placeholder
        run: pnpm metrics:capture

      - name: Upload metrics bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fallow-metrics-${{ github.event.pull_request.number || github.sha }}
          path: fallow-out/
          if-no-files-found: warn
          retention-days: 30

  backstop:
    name: fallow whole-repo regression backstop (main, non-blocking)
    # Whole-repo run catches graph-level regressions OUTSIDE any single PR diff
    # (e.g. a merge that deletes the last importer of an export elsewhere) that
    # the diff-scoped audit can miss. Main only; advisory during the trial.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Install deps BEFORE the fallow step so the pinned fallow (2.96.0) is
      # present in node_modules and the Action's version resolution from
      # package.json is unambiguous — no chance of falling back to latest.
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: fallow regression backstop
        continue-on-error: true   # trial: measure creep, don't enforce
        # Pinned to a full commit SHA (== tag v2.96.0), not the mutable @v2 tag:
        # this third-party action runs with security-events:write + pnpm install,
        # so a repointed tag could exfiltrate job secrets. Bump deliberately.
        uses: fallow-rs/fallow@24a30b1d266f477c30f6878fc9e4c34c00d04d75 # v2.96.0
        with:
          command: ""
          fail-on-issues: false
          format: json
          # Reads the committed regression-count floor from .fallowrc.json
          # (regression.baseline). fail-on-issues:false + continue-on-error keep
          # this advisory during the trial; the delta is visible in the artifact.
          args: --fail-on-regression --tolerance 0
          version: ""
          artifacts-dir: fallow-backstop
      - name: Upload backstop result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fallow-backstop-${{ github.sha }}
          path: fallow-backstop/
          if-no-files-found: warn
          retention-days: 30
