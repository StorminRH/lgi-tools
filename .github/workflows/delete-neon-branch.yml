name: Delete Neon Branch

# Previews are manual-on-demand only (automatic per-push previews are retired
# via `git.deploymentEnabled` in vercel.json). When someone spins up a manual
# preview, the Vercel ↔ Neon integration creates `preview/<branch-name>` but
# never deletes it on PR close — this workflow does. Most PRs now have no
# preview branch, so the delete step is allowed to fail without reddening the
# run (continue-on-error). Runs on both merged and closed-without-merging PRs.

on:
  pull_request:
    types: [closed]

jobs:
  delete-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Delete preview/<branch> in Neon
        continue-on-error: true
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: preview/${{ github.event.pull_request.head.ref }}
          api_key: ${{ secrets.NEON_API_KEY }}
